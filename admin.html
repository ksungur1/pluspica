<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlusPica Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-[#1e3470] text-white">

<div class="max-w-3xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6 text-center">Rezervasyon Oluştur</h1>

<div class="bg-white text-slate-900 rounded-xl p-6 space-y-4">

<select id="villa" class="w-full p-3 border rounded-lg">
<option>Villa Rüya-1</option>
<option>Villa Rüya-2</option>
<option>Villa Rüya-3</option>
<option>Villa Rüya-4</option>
</select>

<input id="name" placeholder="Ad Soyad" class="w-full p-3 border rounded-lg">
<input id="tcno" placeholder="T.C. Kimlik No" class="w-full p-3 border rounded-lg">
<input id="phone" placeholder="Telefon" class="w-full p-3 border rounded-lg">

<div class="grid grid-cols-2 gap-3">
<input type="date" id="checkin" class="p-3 border rounded-lg">
<input type="date" id="checkout" class="p-3 border rounded-lg">
</div>

<input id="deposit" placeholder="Kapora Tutarı" class="w-full p-3 border rounded-lg">

<textarea id="note" placeholder="Not" class="w-full p-3 border rounded-lg"></textarea>

<div class="bg-gray-100 p-4 rounded-lg">
<p id="night"></p>
<p id="total"></p>
<p id="remaining"></p>
</div>

<button onclick="generatePDF()" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold">
PDF Oluştur
</button>

</div>
</div>

<script>
const { jsPDF } = window.jspdf;

function generatePDF() {

const name = document.getElementById("name").value;
const tcnoRaw = document.getElementById("tcno").value;
const tcno = tcnoRaw.replace(/\D/g, ""); // düzeltildi
const phone = document.getElementById("phone").value;
const villa = document.getElementById("villa").value;
const checkin = document.getElementById("checkin").value;
const checkout = document.getElementById("checkout").value;
const deposit = Number(document.getElementById("deposit").value) || 0;
const note = document.getElementById("note").value;

if (!name || !checkin || !checkout) {
alert("Lütfen gerekli alanları doldurun.");
return;
}

if (tcno && tcno.length !== 11) {
alert("T.C. Kimlik No 11 haneli olmalıdır.");
return;
}

const nights = Math.floor((new Date(checkout) - new Date(checkin)) / (1000 * 60 * 60 * 24));
const price = 8000; // sabit örnek
const total = nights * price;
const remaining = total - deposit;

const rezervasyonNo = "PP-" + Date.now();

const doc = new jsPDF();

doc.setFont("helvetica");

let y = 20;

// LOGO
doc.setFillColor(30, 52, 112);
doc.rect(0, 0, 210, 30, "F");

doc.setTextColor(255,255,255);
doc.setFontSize(18);
doc.text("PLUSPICA", 15, 18);

doc.setFontSize(10);
doc.text("Rezervasyon Formu", 15, 24);

doc.setFontSize(9);
doc.text(new Date().toLocaleString("tr-TR"), 150, 18);

y = 40;

// BAŞLIK
doc.setTextColor(0,0,0);
doc.setFontSize(14);
doc.text("Rezervasyon Detayları", 15, y);

y += 10;

doc.setFontSize(10);

doc.text(`Rezervasyon No: ${rezervasyonNo}`, 15, y); y+=7;
doc.text(`Villa: ${villa}`, 15, y); y+=7;

y+=3;

doc.text("Müşteri Bilgileri", 15, y); y+=7;
doc.text(`Ad Soyad: ${name}`, 15, y); y+=6;
doc.text(`T.C.: ${tcno}`, 15, y); y+=6;
doc.text(`Telefon: ${phone}`, 15, y); y+=10;

doc.text("Konaklama Bilgileri", 15, y); y+=7;
doc.text(`Giriş: ${checkin}`, 15, y); y+=6;
doc.text(`Çıkış: ${checkout}`, 15, y); y+=6;
doc.text(`Gece: ${nights}`, 15, y); y+=10;

// Fiyat kutusu
doc.setFillColor(230,240,230);
doc.rect(15, y, 180, 25, "F");

doc.setFontSize(12);
doc.text(`Toplam: ${total} TL`, 20, y+10);
doc.text(`Kapora: ${deposit} TL`, 20, y+17);
doc.text(`Kalan: ${remaining} TL`, 110, y+14);

y += 35;

// Not
doc.setFontSize(10);
doc.text("Not:", 15, y);
y+=5;
doc.text(note || "-", 15, y);

y += 20;

// İmza alanı
doc.line(15, y, 80, y);
doc.line(120, y, 185, y);

doc.text("Müşteri İmza", 20, y+5);
doc.text("Yetkili İmza", 130, y+5);

doc.save(`rezervasyon-${villa}.pdf`);
}
</script>

</body>
</html>
