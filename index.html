<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlusPica</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#1e3470] font-sans text-white">
  <div class="max-w-[1500px] mx-auto px-6 py-10">

    <div class="flex items-center justify-center gap-6 mt-10 mb-12 px-4 flex-wrap">
      <img
        src="logo.png"
        class="w-[800px] md:w-[1000px] opacity-95 drop-shadow-[0_0_20px_rgba(255,255,255,0.4)]"
        alt="PlusPica Logo"
      />

      <div class="text-center mt-8 mb-10 px-4">
        <h1
          class="text-white text-5xl md:text-7xl leading-none"
          style="font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: 0.5px;"
        >
          Kalkan'da Seçili Lüks Villalar
        </h1>

        <p
          class="text-white/80 mt-4 text-base md:text-lg"
          style="font-family: 'Inter', sans-serif; font-weight: 400; letter-spacing: 0.4px;"
        >
          Günlük ve haftalık kiralama seçenekleri
        </p>
      </div>
    </div>

    <div id="loading" class="text-center text-white/80 py-10">Yükleniyor...</div>
    <div id="error" class="hidden text-center text-red-200 py-10"></div>

    <div id="villaList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-12"></div>
    <div id="selectedSection" class="space-y-8"></div>
  </div>

  <script>
    const WHATSAPP = "905339134700";
    const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
    const days = ["Pzt", "Sal", "Çar", "Per", "Cum", "Cts", "Paz"];

    let villas = [];
    let selectedVilla = null;
    let selectedImageIndex = 0;
    let startDate = null;
    let endDate = null;

    function formatPrice(p) {
      return Number(p).toLocaleString("tr-TR") + " ₺";
    }

    function parseISO(iso) {
      return new Date(iso + "T00:00:00");
    }

    function formatDateTR(iso) {
      const d = parseISO(iso);
      return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    function getBookedMap(villa) {
      const map = {};
      (villa.bookedDates || []).forEach(date => {
        map[date] = { status: "dolu", price: villa.price };
      });
      return map;
    }

    function hasBookedDayBetween(startIso, endIso) {
      const booked = getBookedMap(selectedVilla);
      const start = parseISO(startIso);
      const end = parseISO(endIso);

      const current = new Date(start);
      current.setDate(current.getDate() + 1);

      while (current < end) {
        const iso = current.toISOString().split("T")[0];
        if (booked[iso]?.status === "dolu") return true;
        current.setDate(current.getDate() + 1);
      }
      return false;
    }

    function isSameDay(a, b) {
      return a === b;
    }

    function isInSelectedRange(iso) {
      if (!startDate || !endDate) return false;
      return iso > startDate && iso < endDate;
    }

    function nightsBetween(startIso, endIso) {
      const ms = parseISO(endIso) - parseISO(startIso);
      return Math.round(ms / (1000 * 60 * 60 * 24));
    }

    function resetSelection() {
      startDate = null;
      endDate = null;
    }

    function selectDate(iso) {
      const booked = getBookedMap(selectedVilla);
      if (booked[iso]?.status === "dolu") return;

      if (!startDate || (startDate && endDate)) {
        startDate = iso;
        endDate = null;
        renderSelectedSection();
        return;
      }

      if (iso === startDate) {
        endDate = null;
        renderSelectedSection();
        return;
      }

      if (parseISO(iso) < parseISO(startDate)) {
        startDate = iso;
        endDate = null;
        renderSelectedSection();
        return;
      }

      if (hasBookedDayBetween(startDate, iso)) {
        alert("Seçtiğiniz tarih aralığında dolu gün bulunuyor. Lütfen farklı bir aralık seçin.");
        return;
      }

      endDate = iso;
      renderSelectedSection();
    }

    function getReservationSummary() {
      if (!startDate || !endDate) {
        return `
          <div class="bg-white text-slate-900 rounded-[28px] p-5 shadow-lg">
            <div class="text-lg font-semibold mb-2">Rezervasyon Özeti</div>
            <div class="text-slate-500">Lütfen giriş ve çıkış tarihi seçin.</div>
          </div>
        `;
      }

      const nights = nightsBetween(startDate, endDate);
      const total = nights * selectedVilla.price;
      const message = `Merhaba, ${selectedVilla.name} için ${formatDateTR(startDate)} giriş ve ${formatDateTR(endDate)} çıkış olmak üzere ${nights} gecelik rezervasyon hakkında bilgi almak istiyorum. Toplam fiyat: ${formatPrice(total)}.`;

      return `
        <div class="bg-white text-slate-900 rounded-[28px] p-5 shadow-lg">
          <div class="text-lg font-semibold mb-4">Rezervasyon Özeti</div>
          <div class="space-y-2 text-sm md:text-base">
            <div><span class="font-medium">Giriş:</span> ${formatDateTR(startDate)}</div>
            <div><span class="font-medium">Çıkış:</span> ${formatDateTR(endDate)}</div>
            <div><span class="font-medium">Gece:</span> ${nights}</div>
            <div><span class="font-medium">Toplam Tutar:</span> ${formatPrice(total)}</div>
          </div>

          <a
            href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent(message)}"
            target="_blank"
            class="mt-5 inline-flex items-center justify-center rounded-xl bg-green-500 text-white px-5 py-3 font-medium hover:bg-green-600 transition w-full md:w-fit"
          >
            WhatsApp ile Rezervasyon Sor
          </a>
        </div>
      `;
    }

    function buildMonth(year, month) {
      const booked = getBookedMap(selectedVilla);
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const startOffset = (first.getDay() + 6) % 7;
      const total = Math.ceil((startOffset + last.getDate()) / 7) * 7;

      let html = `<div class="bg-white text-slate-900 rounded-[28px] p-4 shadow-lg">`;
      html += `<h3 class="text-center font-semibold text-lg mb-3">${months[month]} ${year}</h3>`;
      html += `<div class="grid grid-cols-7 text-center text-sm text-slate-500 mb-2">`;
      days.forEach(d => html += `<div>${d}</div>`);
      html += `</div>`;
      html += `<div class="grid grid-cols-7 gap-2">`;

      for (let i = 0; i < total; i++) {
        const date = new Date(year, month, i - startOffset + 1);
        const iso = date.toISOString().split("T")[0];
        const isCurrentMonth = date.getMonth() === month;
        const isBooked = booked[iso]?.status === "dolu";
        const isStart = startDate && isSameDay(iso, startDate);
        const isEnd = endDate && isSameDay(iso, endDate);
        const isRange = isInSelectedRange(iso);
        const price = selectedVilla.price;

        let style = "bg-slate-100 text-slate-400";
        let clickable = "";

        if (isCurrentMonth) {
          if (isBooked) {
            style = "bg-rose-100 text-rose-500";
          } else if (isStart || isEnd) {
            style = "bg-emerald-500 text-white";
            clickable = "hover:scale-105";
          } else if (isRange) {
            style = "bg-emerald-100 text-emerald-900";
            clickable = "hover:scale-105";
          } else {
            style = "bg-blue-200 text-blue-900";
            clickable = "hover:scale-105";
          }
        }

        html += `
          <button
            ${isCurrentMonth && !isBooked ? `onclick="selectDate('${iso}')"` : ""}
            class="rounded-xl p-2 text-xs transition ${style} ${isBooked ? 'opacity-70 cursor-not-allowed' : 'cursor-pointer'} ${clickable}"
          >
            <div class="font-bold">${date.getDate()}</div>
            <div>${formatPrice(price)}</div>
          </button>
        `;
      }

      html += `</div></div>`;
      return html;
    }

    function renderVillaList() {
      const list = document.getElementById("villaList");
      list.innerHTML = "";

      villas.forEach(v => {
        const card = document.createElement("button");
        card.className = `
          bg-white rounded-[28px] overflow-hidden shadow-lg text-left text-slate-900
          transition hover:-translate-y-1 border-2
          ${selectedVilla && selectedVilla.id === v.id ? "border-white/80" : "border-transparent"}
        `;

        card.onclick = () => {
          selectedVilla = v;
          selectedImageIndex = 0;
          resetSelection();
          render();
          document.getElementById("selectedSection").scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        };

        card.innerHTML = `
          <div class="relative">
            <img src="${v.cover}" class="w-full h-[240px] object-cover" />
          </div>

          <div class="p-5">
            <div class="flex justify-between items-start gap-3">
              <div class="text-2xl font-semibold leading-tight">${v.name}</div>
              <div class="text-xl font-semibold whitespace-nowrap">${formatPrice(v.price)}</div>
            </div>
            <div class="text-sm text-slate-500 mt-2">${v.location}</div>
            <div class="text-sm text-slate-700 mt-4 leading-7">${v.description}</div>
            <div class="text-sm text-slate-500 mt-3">Kapasite: ${v.capacity}</div>
          </div>
        `;

        list.appendChild(card);
      });
    }

    function renderGalleryThumbs() {
      return selectedVilla.images.map((img, index) => `
        <button
          onclick="changeImage(${index})"
          class="shrink-0 rounded-2xl overflow-hidden border-2 ${selectedImageIndex === index ? 'border-[#1e3470]' : 'border-transparent'}"
        >
          <img src="${img}" class="w-28 h-20 md:w-36 md:h-24 object-cover" />
        </button>
      `).join("");
    }

    function renderSelectedSection() {
      const section = document.getElementById("selectedSection");

      if (!selectedVilla) {
        section.innerHTML = "";
        return;
      }

      section.innerHTML = `
        <div class="bg-white text-slate-900 rounded-[32px] overflow-hidden shadow-xl">
          <div class="grid lg:grid-cols-2 gap-0">
            <div class="p-4 md:p-6">
              <img src="${selectedVilla.images[selectedImageIndex]}" class="w-full h-72 md:h-[460px] object-cover rounded-[24px]" />

              <div class="mt-4 overflow-x-auto">
                <div class="flex gap-3 pb-2">
                  ${renderGalleryThumbs()}
                </div>
              </div>
            </div>

            <div class="p-6 md:p-8 flex flex-col justify-center">
              <div class="flex flex-col gap-4">
                <h2 class="text-3xl md:text-4xl font-bold">${selectedVilla.name}</h2>
                <div class="text-slate-500">${selectedVilla.location}</div>
                <div class="text-slate-700 leading-7">${selectedVilla.description}</div>
                <div class="text-slate-500">Kapasite: ${selectedVilla.capacity}</div>
                <div class="text-2xl font-semibold">${formatPrice(selectedVilla.price)} / gece</div>

                <div class="text-sm text-slate-500">
                  Takvimden giriş ve çıkış tarihi seçerek toplam tutarı görebilirsiniz.
                </div>

                <a
                  href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent(`Merhaba, ${selectedVilla.name} hakkında bilgi almak istiyorum.`)}"
                  target="_blank"
                  class="inline-flex items-center justify-center rounded-xl bg-green-500 text-white px-5 py-3 font-medium hover:bg-green-600 transition w-full md:w-fit"
                >
                  WhatsApp ile Bilgi Al
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-6">
          <div class="lg:col-span-1">
            ${getReservationSummary()}
          </div>
          <div class="lg:col-span-2 grid md:grid-cols-2 gap-6">
            ${buildMonth(2026, 3)}
            ${buildMonth(2026, 4)}
          </div>
        </div>
      `;
    }

    function changeImage(index) {
      selectedImageIndex = index;
      renderSelectedSection();
    }

    async function loadVillas() {
      const loading = document.getElementById("loading");
      const error = document.getElementById("error");

      try {
        const response = await fetch("./villas.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("villas.json okunamadı.");
        }

        villas = await response.json();

        if (!Array.isArray(villas) || villas.length === 0) {
          throw new Error("Villa verisi bulunamadı.");
        }

        selectedVilla = villas[0];
        loading.classList.add("hidden");
        render();
      } catch (err) {
        loading.classList.add("hidden");
        error.classList.remove("hidden");
        error.textContent = "Veriler yüklenemedi. Dosya adlarını ve villas.json içeriğini kontrol et.";
        console.error(err);
      }
    }

    function render() {
      renderVillaList();
      renderSelectedSection();
    }

    loadVillas();
  </script>
</body>
</html>
