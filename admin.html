<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlusPica Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#1e3470] text-white font-sans">
  <div class="max-w-3xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6">Rezervasyon Oluştur</h1>

    <div class="bg-white text-slate-900 rounded-xl p-6 space-y-4 shadow-xl">
      <select id="villaSelect" class="w-full p-3 border rounded-lg"></select>

      <input id="name" placeholder="Ad Soyad" class="w-full p-3 border rounded-lg"/>
      <input id="tcno" placeholder="T.C. Kimlik No" class="w-full p-3 border rounded-lg" maxlength="11"/>
      <input id="phone" placeholder="Telefon" class="w-full p-3 border rounded-lg"/>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="date" id="startDate" class="p-3 border rounded-lg"/>
        <input type="date" id="endDate" class="p-3 border rounded-lg"/>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="deposit" type="number" min="0" placeholder="Kapora Tutarı" class="w-full p-3 border rounded-lg"/>
        <input id="remaining" type="text" placeholder="Kalan Ödeme otomatik hesaplanır" class="w-full p-3 border rounded-lg bg-slate-100" readonly/>
      </div>

      <textarea id="note" placeholder="Not" class="w-full p-3 border rounded-lg min-h-[90px]"></textarea>

      <div class="bg-slate-100 p-4 rounded-lg space-y-1">
        <div>Gece: <b id="nights">0</b></div>
        <div>Toplam: <b id="total">0 ₺</b></div>
        <div>Kalan Ödeme: <b id="remainingPreview">0 ₺</b></div>
      </div>

      <button onclick="createPDF()" class="w-full bg-green-500 hover:bg-green-600 text-white p-3 rounded-lg transition">
        PDF / Yazdır Belgesi Oluştur
      </button>
    </div>
  </div>

  <script>
    let villas = [];

    function parseISO(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDateTR(iso) {
      const d = parseISO(iso);
      const aylar = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
      return `${d.getDate()} ${aylar[d.getMonth()]} ${d.getFullYear()}`;
    }

    function getNightPrice(villa, month) {
      return Number(villa.monthlyPrices?.[String(month)] || villa.monthlyPrices?.[month] || 0);
    }

    function formatCurrency(value) {
      return Number(value || 0).toLocaleString("tr-TR") + " ₺";
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function makeReservationNo() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const h = String(now.getHours()).padStart(2, "0");
      const min = String(now.getMinutes()).padStart(2, "0");
      return `PP-${y}${m}${d}-${h}${min}`;
    }

    function calc() {
      const villa = villas[document.getElementById("villaSelect").value];
      const start = document.getElementById("startDate").value;
      const end = document.getElementById("endDate").value;
      const deposit = Number(document.getElementById("deposit").value || 0);

      if (!villa || !start || !end) {
        document.getElementById("nights").innerText = "0";
        document.getElementById("total").innerText = "0 ₺";
        document.getElementById("remaining").value = "0 ₺";
        document.getElementById("remainingPreview").innerText = "0 ₺";
        return null;
      }

      let total = 0;
      let nights = 0;

      let current = parseISO(start);
      const endDate = parseISO(end);

      while (current < endDate) {
        total += getNightPrice(villa, current.getMonth() + 1);
        current.setDate(current.getDate() + 1);
        nights++;
      }

      const remaining = Math.max(total - deposit, 0);

      document.getElementById("nights").innerText = nights;
      document.getElementById("total").innerText = formatCurrency(total);
      document.getElementById("remaining").value = formatCurrency(remaining);
      document.getElementById("remainingPreview").innerText = formatCurrency(remaining);

      return { total, nights, remaining, deposit };
    }

    async function load() {
      const res = await fetch("./villas.json", { cache: "no-store" });
      villas = await res.json();

      const select = document.getElementById("villaSelect");
      select.innerHTML = "";

      villas.forEach((villa, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.innerText = villa.name;
        select.appendChild(opt);
      });

      calc();
    }

    document.getElementById("villaSelect").addEventListener("change", calc);
    document.getElementById("startDate").addEventListener("change", calc);
    document.getElementById("endDate").addEventListener("change", calc);
    document.getElementById("deposit").addEventListener("input", calc);

    function buildReservationHtml({
      reservationNo,
      villa,
      name,
      tcno,
      phone,
      start,
      end,
      nights,
      avg,
      total,
      deposit,
      remaining,
      note,
      createdAt
    }) {
      return `

<body>
  <div class="sheet">
    <div class="topbar">
      <div class="brand">
        <img src="logo.png" alt="PlusPica Logo">
        <div class="brand-text">
          <h1>Rezervasyon Formu</h1>
          <p>PlusPica</p>
        </div>
      </div>
      <div class="meta">
        <div>Rezervasyon No</div>
        <strong>${escapeHtml(reservationNo)}</strong>
        <div style="margin-top:8px;">Oluşturma Tarihi</div>
        <strong>${escapeHtml(createdAt)}</strong>
      </div>
    </div>

    <div class="content">
      <div class="title">Rezervasyon Detayları</div>

      <div class="villa-box">
        <div class="label">Villa</div>
        <div class="value">${escapeHtml(villa.name)}</div>
      </div>

      <div class="section-title">Müşteri Bilgileri</div>
      <div class="grid">
        <div class="card">
          <div class="label">Ad Soyad</div>
          <div class="big">${escapeHtml(name)}</div>
        </div>
        <div class="card">
          <div class="label">Telefon</div>
          <div class="big">${escapeHtml(phone)}</div>
        </div>
        <div class="card">
          <div class="label">T.C. Kimlik No</div>
          <div class="big">${escapeHtml(tcno || "-")}</div>
        </div>
        <div class="card">

          <div class="big">Rezervasyon Ön Hazırlık Formu</div>

      <div class="section-title">Konaklama Bilgileri</div>

        <div class="card">

        </div>
        <div class="card">

          <div class="big">${escapeHtml(String(nights))} gece</div>
        </div>
        <div class="card">
          <div class="label">Gecelik Ortalama</div>
          <div class="big">${escapeHtml(avg)}</div>
        </div>
      </div>

      <div class="total">
        <div class="ttl-label">Toplam Tutar</div>
        <div class="ttl-value">${escapeHtml(total)}</div>
      </div>

      <div class="section-title">Ödeme Bilgileri</div>
      <div class="grid-3">
        <div class="card">
          <div class="label">Toplam Konaklama Bedeli</div>
          <div class="big">${escapeHtml(total)}</div>
        </div>

          <div class="big">${escapeHtml(deposit)}</div>
        </div>
        <div class="card">
          <div class="label">Kalan Ödeme</div>
          <div class="big">${escapeHtml(remaining)}</div>
        </div>
      </div>

        <div class="signature-box">
          <div class="signature-line">Müşteri İmzası</div>
        </div>
        <div class="signature-box">
          <div class="signature-line">Yetkili İmzası</div>

    </div>

      `;
    }

    function createPDF() {
      const villa = villas[document.getElementById("villaSelect").value];
      const name = document.getElementById("name").value.trim();
      const tcno = document.getElementById("tcno").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const start = document.getElementById("startDate").value;
      const end = document.getElementById("endDate").value;
      const note = document.getElementById("note").value.trim();
      const depositValue = Number(document.getElementById("deposit").value || 0);

      if (!villa || !name || !phone || !start || !end) {
        alert("Lütfen villa, müşteri adı, telefon ve tarih alanlarını doldurun.");
        return;
      }

      if (tcno && !/^\\d{11}$/.test(tcno)) {
        alert("T.C. Kimlik No 11 haneli olmalıdır.");
        return;
      }

      const result = calc();
      if (!result || result.nights <= 0) {
        alert("Tarih aralığını kontrol edin.");
        return;
      }

      const createdAt = new Date().toLocaleString("tr-TR");
      const reservationNo = makeReservationNo();

      const html = buildReservationHtml({
        reservationNo,
        villa,
        name,
        tcno,
        phone,
        start: formatDateTR(start),
        end: formatDateTR(end),
        nights: result.nights,
        avg: formatCurrency(Math.round(result.total / result.nights)),
        total: formatCurrency(result.total),
        deposit: formatCurrency(depositValue),
        remaining: formatCurrency(result.remaining),
        note,
        createdAt
      });

      const printWindow = window.open("", "_blank");

      printWindow.document.open();
      printWindow.document.write(html);
      printWindow.document.close();

      printWindow.onload = () => {
        printWindow.focus();
        setTimeout(() => {
          printWindow.print();
        }, 500);
      };
    }

    load();
  </script>
