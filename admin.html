<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlusPica Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#1e3470] text-white font-sans">

<div class="max-w-3xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6">Rezervasyon Oluştur</h1>

  <div class="bg-white text-slate-900 rounded-xl p-6 space-y-4 shadow-xl">

    <select id="villaSelect" class="w-full p-3 border rounded-lg"></select>

    <input id="name" placeholder="Ad Soyad" class="w-full p-3 border rounded-lg"/>
    <input id="tcno" placeholder="T.C. Kimlik No" maxlength="11" class="w-full p-3 border rounded-lg"/>
    <input id="phone" placeholder="Telefon" class="w-full p-3 border rounded-lg"/>

    <div class="grid grid-cols-2 gap-4">
      <input type="date" id="startDate" class="p-3 border rounded-lg"/>
      <input type="date" id="endDate" class="p-3 border rounded-lg"/>
    </div>

    <input id="deposit" type="number" placeholder="Kapora" class="w-full p-3 border rounded-lg"/>

    <textarea id="note" placeholder="Not" class="w-full p-3 border rounded-lg"></textarea>

    <div class="bg-slate-100 p-4 rounded-lg">
      <div>Gece: <b id="nights">0</b></div>
      <div>Toplam: <b id="total">0 ₺</b></div>
      <div>Kalan: <b id="remaining">0 ₺</b></div>
    </div>

    <!-- KAYDET -->
    <button onclick="saveReservation()" class="w-full bg-blue-600 text-white p-3 rounded-lg">
      Rezervasyonu Kaydet
    </button>

    <!-- PDF -->
    <button onclick="createPDF()" class="w-full bg-green-500 text-white p-3 rounded-lg">
      PDF Oluştur
    </button>

  </div>
</div>

<script>
let villas = [];
const API = "https://script.google.com/macros/s/AKfycbz0So0p3eadwSXBlE2TsvoQjmVbiW0lLzWPf_HGOLQwtWY4DmycdXm-1UaawINS3Ed5QA/exec";

function parseDate(d){
  const [y,m,day]=d.split("-").map(Number);
  return new Date(y,m-1,day);
}

function formatTR(d){
  return new Date(d).toLocaleDateString("tr-TR");
}

function formatMoney(v){
  return Number(v).toLocaleString("tr-TR")+" ₺";
}

function calc(){
  const villa=villas[document.getElementById("villaSelect").value];
  const s=document.getElementById("startDate").value;
  const e=document.getElementById("endDate").value;
  const deposit=Number(document.getElementById("deposit").value||0);

  if(!villa||!s||!e) return;

  let start=parseDate(s);
  let end=parseDate(e);

  let total=0,nights=0;

  while(start<end){
    total+=villa.monthlyPrices[start.getMonth()+1];
    start.setDate(start.getDate()+1);
    nights++;
  }

  let remaining=total-deposit;

  document.getElementById("nights").innerText=nights;
  document.getElementById("total").innerText=formatMoney(total);
  document.getElementById("remaining").innerText=formatMoney(remaining);

  return {total,nights,remaining,deposit};
}

function reservationNo(name){
  let d=new Date();
  return "PP-"+d.getTime();
}

async function load(){
  let res=await fetch("./villas.json");
  villas=await res.json();

  let sel=document.getElementById("villaSelect");
  villas.forEach((v,i)=>{
    let o=document.createElement("option");
    o.value=i;
    o.innerText=v.name;
    sel.appendChild(o);
  });
}

async function saveReservation(){
  let data=calc();
  if(!data){ alert("Eksik alan"); return; }

  const payload={
    rezervasyonNo: reservationNo(),
    olusturmaTarihi:new Date().toLocaleString("tr-TR"),
    villa:villas[villaSelect.value].name,
    adSoyad:name.value,
    tcno:tcno.value,
    telefon:phone.value,
    giris:formatTR(startDate.value),
    cikis:formatTR(endDate.value),
    gece:data.nights,
    toplam:data.total,
    kapora:data.deposit,
    kalan:data.remaining,
    not:note.value
  };

  await fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify(payload)
  });

  alert("Kaydedildi ✅");
}

function createPDF(){
  window.print();
}

document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("change",calc);
  el.addEventListener("input",calc);
});

load();
</script>

</body>
</html>
