<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlusPica Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#1e3470] text-white font-sans">

<div class="max-w-3xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6">Rezervasyon Oluştur</h1>

  <div class="bg-white text-slate-900 rounded-xl p-6 space-y-4 shadow-xl">

    <select id="villaSelect" class="w-full p-3 border rounded-lg"></select>

    <input id="name" placeholder="Ad Soyad" class="w-full p-3 border rounded-lg"/>
    <input id="tcno" placeholder="T.C. Kimlik No" maxlength="11" class="w-full p-3 border rounded-lg"/>
    <input id="phone" placeholder="Telefon" class="w-full p-3 border rounded-lg"/>

    <div class="grid grid-cols-2 gap-4">
      <input type="date" id="startDate" class="p-3 border rounded-lg"/>
      <input type="date" id="endDate" class="p-3 border rounded-lg"/>
    </div>

    <input id="deposit" type="number" placeholder="Kapora" class="w-full p-3 border rounded-lg"/>

    <textarea id="note" placeholder="Not" class="w-full p-3 border rounded-lg"></textarea>

    <div class="bg-slate-100 p-4 rounded-lg">
      <div>Gece: <b id="nights">0</b></div>
      <div>Toplam: <b id="total">0 ₺</b></div>
      <div>Kalan: <b id="remaining">0 ₺</b></div>
    </div>

    <!-- KAYDET -->
    <button onclick="saveReservation()" class="w-full bg-blue-600 text-white p-3 rounded-lg">
      Rezervasyonu Kaydet
    </button>

    <!-- PDF -->
    <button onclick="createPDF()" class="w-full bg-green-500 text-white p-3 rounded-lg">
      PDF Oluştur
    </button>
    <div class="bg-white text-black rounded-xl p-6 mt-6">
  <h2 class="text-xl font-bold mb-4">Rezervasyon Listesi</h2>
  <div id="list"></div>
</div>

  </div>
</div>

<script>
  async function loadReservations() {
  const res = await fetch(API);
  const data = await res.json();

  let html = "";

data.reverse().forEach(r => {
  html += `
    <div class="bg-white border rounded-xl p-4 mb-3 shadow-sm">

      <div class="flex justify-between items-center mb-2">
        <div class="font-bold text-lg">${r["Ad Soyad"] || "-"}</div>
        <div class="text-sm text-gray-500">${r["Rezervasyon No"] || "-"}</div>
      </div>

      <div class="text-sm text-gray-600 mb-1">
        🏡 ${r["Villa"] || "-"}
      </div>

      <div class="text-sm text-gray-600 mb-2">
        📅 ${prettyDate(r["Giriş Tarihi"])} → ${prettyDate(r["Çıkış Tarihi"])}
      </div>

      <div class="grid grid-cols-3 gap-2 text-sm">
        <div class="bg-gray-100 p-2 rounded">
          💰 ${r["Toplam Tutar"] || 0} ₺
        </div>
        <div class="bg-gray-100 p-2 rounded">
          💵 ${r["Kapora"] || 0} ₺
        </div>
        <div class="bg-gray-100 p-2 rounded">
          🧾 ${r["Kalan Ödeme"] || 0} ₺
        </div>
      </div>

    </div>
  `;
});

  document.getElementById("list").innerHTML = html;
}
let villas = [];
const API = "https://script.google.com/macros/s/AKfycbz0So0p3eadwSXBlE2TsvoQjmVbiW0lLzWPf_HGOLQwtWY4DmycdXm-1UaawINS3Ed5QA/exec";

function parseDate(d){
  const [y,m,day]=d.split("-").map(Number);
  return new Date(y,m-1,day);
}

function prettyDate(value) {
  if (!value) return "-";
  const d = new Date(value);
  if (isNaN(d)) return value;
  return d.toLocaleDateString("tr-TR");
}

function formatMoney(v){
  return Number(v).toLocaleString("tr-TR")+" ₺";
}

function calc(){
  const villa=villas[document.getElementById("villaSelect").value];
  const s=document.getElementById("startDate").value;
  const e=document.getElementById("endDate").value;
  const deposit=Number(document.getElementById("deposit").value||0);

  if(!villa||!s||!e) return;

  let start=parseDate(s);
  let end=parseDate(e);

  let total=0,nights=0;

  while(start<end){
    total+=villa.monthlyPrices[start.getMonth()+1];
    start.setDate(start.getDate()+1);
    nights++;
  }

  let remaining=total-deposit;

  document.getElementById("nights").innerText=nights;
  document.getElementById("total").innerText=formatMoney(total);
  document.getElementById("remaining").innerText=formatMoney(remaining);

  return {total,nights,remaining,deposit};
}

function reservationNo(name){
  let d=new Date();
  return "PP-"+d.getTime();
}

async function load(){
  let res=await fetch("./villas.json");
  villas=await res.json();

  let sel=document.getElementById("villaSelect");
  villas.forEach((v,i)=>{
    let o=document.createElement("option");
    o.value=i;
    o.innerText=v.name;
    sel.appendChild(o);
  });
}

async function saveReservation(){
  let data=calc();
  if(!data){ alert("Eksik alan"); return; }

  const payload={
    rezervasyonNo: reservationNo(),
    olusturmaTarihi:new Date().toLocaleString("tr-TR"),
    villa:villas[villaSelect.value].name,
    adSoyad:name.value,
    tcno:tcno.value,
    telefon:phone.value,
    giris:formatTR(startDate.value),
    cikis:formatTR(endDate.value),
    gece:data.nights,
    toplam:data.total,
    kapora:data.deposit,
    kalan:data.remaining,
    not:note.value
  };

  await fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify(payload)
  });

  alert("Kaydedildi ✅");
}

function escapeHtml(str = "") {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function createPDF() {
  const data = calc();
  if (!data) {
    alert("Lütfen tarihleri seçin.");
    return;
  }

  const villa = villas[villaSelect.value];
  const rezNo = reservationNo();
  const createdAt = new Date().toLocaleString("tr-TR");

  const html = `
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Rezervasyon Formu</title>
<style>
@page { size: A4; margin: 12mm; }
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #0f172a;
}
.sheet {
  border: 1px solid #dbe3ef;
  border-radius: 18px;
  overflow: hidden;
}
.topbar {
  background: #1e3470;
  color: white;
  padding: 18px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.brand {
  display: flex;
  align-items: center;
  gap: 18px;
}
.brand img {
  height: 95px;
  width: auto;
}
.brand h1 {
  margin: 0;
  font-size: 24px;
}
.brand p {
  margin: 6px 0 0;
  font-size: 13px;
  opacity: .9;
}
.meta {
  text-align: right;
  font-size: 12px;
}
.meta strong {
  display: block;
  font-size: 14px;
  margin-top: 4px;
}
.content {
  padding: 20px 22px;
}
.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 14px;
}
.section-title {
  font-size: 18px;
  font-weight: bold;
  margin: 18px 0 10px;
}
.box {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 14px;
  padding: 12px 14px;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.grid3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.label {
  font-size: 11px;
  color: #64748b;
  margin-bottom: 5px;
}
.value {
  font-size: 15px;
  font-weight: 600;
}
.villa {
  font-size: 22px;
  font-weight: 700;
}
.total {
  margin-top: 12px;
  background: #ecfdf5;
  border: 1px solid #bbf7d0;
  border-radius: 16px;
  padding: 14px 16px;
}
.total .value {
  color: #166534;
  font-size: 28px;
  font-weight: 800;
}
.note {
  min-height: 65px;
  white-space: pre-wrap;
}
.signatures {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  margin-top: 26px;
}
.sign {
  border-top: 1px solid #94a3b8;
  padding-top: 7px;
  text-align: center;
  font-size: 12px;
  color: #475569;
}
.footer {
  margin-top: 14px;
  font-size: 11px;
  color: #64748b;
  font-style: italic;
}
@media print {
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>
<div class="sheet">
  <div class="topbar">
    <div class="brand">
      <img src="logo.png">
      <div>
        <h1>Rezervasyon Formu</h1>
        <p>PlusPica</p>
      </div>
    </div>
    <div class="meta">
      <div>Rezervasyon No</div>
      <strong>${escapeHtml(rezNo)}</strong>
      <br>
      <div>Oluşturma Tarihi</div>
      <strong>${escapeHtml(createdAt)}</strong>
    </div>
  </div>

  <div class="content">
    <div class="title">Rezervasyon Detayları</div>

    <div class="box">
      <div class="label">Villa</div>
      <div class="villa">${escapeHtml(villa.name)}</div>
    </div>

    <div class="section-title">Müşteri Bilgileri</div>
    <div class="grid">
      <div class="box">
        <div class="label">Ad Soyad</div>
        <div class="value">${escapeHtml(name.value)}</div>
      </div>
      <div class="box">
        <div class="label">Telefon</div>
        <div class="value">${escapeHtml(phone.value)}</div>
      </div>
      <div class="box">
        <div class="label">T.C. Kimlik No</div>
        <div class="value">${escapeHtml(tcno.value || "-")}</div>
      </div>
      <div class="box">
        <div class="label">Belge Tipi</div>
        <div class="value">Rezervasyon Ön Hazırlık Formu</div>
      </div>
    </div>

    <div class="section-title">Konaklama Bilgileri</div>
    <div class="grid">
      <div class="box">
        <div class="label">Giriş Tarihi</div>
        <div class="value">${escapeHtml(formatTR(startDate.value))}</div>
      </div>
      <div class="box">
        <div class="label">Çıkış Tarihi</div>
        <div class="value">${escapeHtml(formatTR(endDate.value))}</div>
      </div>
      <div class="box">
        <div class="label">Gece Sayısı</div>
        <div class="value">${data.nights} gece</div>
      </div>
      <div class="box">
        <div class="label">Gecelik Ortalama</div>
        <div class="value">${escapeHtml(formatMoney(Math.round(data.total / data.nights)))}</div>
      </div>
    </div>

    <div class="total">
      <div class="label">Toplam Tutar</div>
      <div class="value">${escapeHtml(formatMoney(data.total))}</div>
    </div>

    <div class="section-title">Ödeme Bilgileri</div>
    <div class="grid3">
      <div class="box">
        <div class="label">Toplam Konaklama Bedeli</div>
        <div class="value">${escapeHtml(formatMoney(data.total))}</div>
      </div>
      <div class="box">
        <div class="label">Kapora</div>
        <div class="value">${escapeHtml(formatMoney(data.deposit))}</div>
      </div>
      <div class="box">
        <div class="label">Kalan Ödeme</div>
        <div class="value">${escapeHtml(formatMoney(data.remaining))}</div>
      </div>
    </div>

    <div class="section-title">Notlar</div>
    <div class="box note">${escapeHtml(note.value || "Not girilmedi.")}</div>

    <div class="signatures">
      <div class="sign">Müşteri İmzası</div>
      <div class="sign">Yetkili İmzası</div>
    </div>

    <div class="footer">Bu belge PlusPica rezervasyon ön hazırlık formudur.</div>
  </div>
</div>
</body>
</html>
`;

  const w = window.open("", "_blank");
  w.document.open();
  w.document.write(html);
  w.document.close();

  w.onload = () => {
    w.focus();
    setTimeout(() => w.print(), 500);
  };
}

document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("change",calc);
  el.addEventListener("input",calc);
});

load();
loadReservations();
</script>

</body>
</html>
