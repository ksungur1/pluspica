<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlusPica</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1e3470] font-sans text-white">
  
<!-- LOGO SOL ÜST -->
<div class="fixed top-8 left-7 z-30">
  <img 
    src="logo.png"
    class="w-[340px] md:w-[420px] opacity-95 
           drop-shadow-[0_0_25px_rgba(255,255,255,0.5)]"
    alt="PlusPica Logo"
  />
</div>

  <div class="max-w-[1500px] mx-auto px-6 py-10">

    <!-- Başlık -->
    <div class="text-center mt-6 mb-10 px-4">
      <h1 class="text-white text-3xl md:text-5xl font-semibold">
        Kalkan'da Seçili Lüks Villalar
      </h1>
      <p class="text-white/70 mt-3 text-base md:text-xl">
        Günlük ve haftalık kiralama seçenekleri
      </p>
    </div>

    <!-- Villa Kartları -->
    <div id="villaList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-12"></div>

    <!-- Seçili Villa + Takvim -->
    <div id="selectedSection" class="space-y-8"></div>

  </div>

  <script>
    const villas = [
      {
        id: 1,
        name: "Villa Rüya-3",
        image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/ruya-3.jpg",
        price: 9000,
        location: "Kalkan - Kördere",
        description: "4 yatak odası, her odada banyo, özel havuz ve deniz manzarası",
        capacity: "4-8 kişi"
      },
      {
        id: 2,
        name: "Villa Rüya-4",
        image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/ruya-4.jpg",
        price: 9000,
        location: "Kalkan - Kördere",
        description: "4 yatak odası, her odada banyo, özel havuz ve deniz manzarası",
        capacity: "4-8 kişi"
      },
      {
        id: 3,
        name: "Villa Rüya-1",
        image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/ruya-1.jpg",
        price: 8000,
        location: "Kalkan - İslamlar",
        description: "4 yatak odası, her odada banyo, özel havuz, izole bahçe ve orman manzarası",
        capacity: "4-8 kişi"
      },
      {
        id: 4,
        name: "Villa Rüya-2",
        image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/ruya-2.jpg",
        price: 8000,
        location: "Kalkan - İslamlar",
        description: "4 yatak odası, her odada banyo, özel havuz, izole bahçe ve orman manzarası",
        capacity: "4-8 kişi"
      }
    ];

    let selectedVilla = villas[0];

    const WHATSAPP = "905339134700";
    const months = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
    const days = ["Pzt","Sal","Çar","Per","Cum","Cts","Paz"];

    const availability = {
      "2026-04-13": { status: "dolu", price: 4500 },
      "2026-04-14": { status: "dolu", price: 4500 },
      "2026-04-15": { status: "dolu", price: 4500 }
    };

    function formatPrice(p) {
      return p + " ₺";
    }

    function formatDateTR(d) {
      const date = new Date(d);
      return date.getDate() + " " + months[date.getMonth()];
    }

    function openWA(villa, date) {
      const msg = `Merhaba, ${villa} için ${formatDateTR(date)} tarihini sormak istiyorum. Müsait mi?`;
      window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
    }

    function buildMonth(year, month) {
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const start = (first.getDay() + 6) % 7;
      const total = Math.ceil((start + last.getDate()) / 7) * 7;

      let html = `<div class="bg-white text-slate-900 rounded-[28px] p-4 shadow-lg">`;
      html += `<h3 class="text-center font-semibold text-lg mb-3">${months[month]} ${year}</h3>`;
      html += `<div class="grid grid-cols-7 text-center text-sm text-slate-500 mb-2">`;
      days.forEach(d => html += `<div>${d}</div>`);
      html += `</div>`;
      html += `<div class="grid grid-cols-7 gap-2">`;

      for (let i = 0; i < total; i++) {
        const date = new Date(year, month, i - start + 1);
        const iso = date.toISOString().split("T")[0];
        const item = availability[iso];

        const isCurrent = date.getMonth() === month;
        const status = item?.status || "musait";
        const price = item?.price || selectedVilla.price;

        let style = "bg-slate-100 text-slate-400";
        if (isCurrent) {
          style = status === "dolu"
            ? "bg-emerald-200 text-emerald-900"
            : "bg-blue-200 text-blue-900";
        }

        const disabled = status === "dolu";

        html += `
          <button
            onclick="${!disabled ? `openWA('${selectedVilla.name}','${iso}')` : ""}"
            class="rounded-xl p-2 text-xs ${style} ${disabled ? "opacity-60 cursor-not-allowed" : "hover:scale-105 transition"}"
          >
            <div class="font-bold">${date.getDate()}</div>
            <div>${formatPrice(price)}</div>
          </button>
        `;
      }

      html += `</div></div>`;
      return html;
    }

    function renderVillaList() {
      const list = document.getElementById("villaList");
      list.innerHTML = "";

      villas.forEach((v, index) => {
        const card = document.createElement("button");
        card.className = `
          bg-white rounded-[28px] overflow-hidden shadow-lg text-left text-slate-900
          transition hover:-translate-y-1 border-2
          ${selectedVilla.id === v.id ? "border-white/80" : "border-transparent"}
        `;

        card.onclick = () => {
          selectedVilla = v;
          render();
          document.getElementById("selectedSection").scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        };

        card.innerHTML = `
          <div class="relative">
            <img src="${v.image}" class="w-full h-[240px] object-cover" />
            ${index === 0 ? `
             
            ` : ""}
          </div>

          <div class="p-5">
            <div class="flex justify-between items-start gap-3">
              <div class="text-2xl font-semibold leading-tight">${v.name}</div>
              <div class="text-xl font-semibold whitespace-nowrap">${formatPrice(v.price)}</div>
            </div>
            <div class="text-sm text-slate-500 mt-2">${v.location}</div>
            <div class="text-sm text-slate-700 mt-4 leading-7">${v.description}</div>
            <div class="text-sm text-slate-500 mt-3">Kapasite: ${v.capacity}</div>
          </div>
        `;

        list.appendChild(card);
      });
    }

    function renderSelectedSection() {
      const section = document.getElementById("selectedSection");

      section.innerHTML = `
        <div class="bg-white text-slate-900 rounded-[32px] overflow-hidden shadow-xl">
          <img src="${selectedVilla.image}" class="w-full h-72 md:h-[460px] object-cover" />
          <div class="p-6 md:p-8">
            <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-5">
              <div>
                <h2 class="text-3xl md:text-4xl font-bold">${selectedVilla.name}</h2>
                <div class="text-slate-500 mt-3">${selectedVilla.location}</div>
                <div class="text-slate-700 mt-4 leading-7">${selectedVilla.description}</div>
                <div class="text-slate-500 mt-3">Kapasite: ${selectedVilla.capacity}</div>
              </div>
              <div class="text-2xl font-semibold whitespace-nowrap">${formatPrice(selectedVilla.price)} / gece</div>
            </div>
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
          ${buildMonth(2026, 3)}
          ${buildMonth(2026, 4)}
        </div>
      `;
    }

    function render() {
      renderVillaList();
      renderSelectedSection();
    }

    render();
  </script>
</body>
</html>
