<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlusPica</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#11296b] text-white">

  <div class="max-w-7xl mx-auto px-6 py-10">

    <!-- LOGO -->
 <div class="flex justify-center mb-16">
  <img 
    src="logo.png"
    class="w-[420px] mix-blend-multiply"
  />
</div>

    <!-- VILLA KARTLARI -->
    <div id="villaList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-10"></div>

    <!-- SEÇİLİ VİLLA -->
    <div id="selectedSection"></div>

  </div>

  <script>
    const villas = [
      {
        id: 1,
        name: "Villa Rüya-3",
        image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/ruya-3.jpg",
        price: 9000,
        location: "Kalkan - Kördere",
        description: "4 yatak odası, her odada banyo, özel havuz ve deniz manzarası",
        capacity: "4-8 kişi"
      },
      {
        id: 2,
        name: "Villa Rüya-4",
        image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/ruya-4.jpg",
        price: 9000,
        location: "Kalkan - Kördere",
        description: "4 yatak odası, her odada banyo, özel havuz ve deniz manzarası",
        capacity: "4-8 kişi"
      },
      {
        id: 3,
        name: "Villa Rüya-1",
        image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/ruya-1.jpg",
        price: 8000,
        location: "Kalkan - İslamlar",
        description: "4 yatak odası, her odada banyo, özel havuz, izole bahçe ve orman manzarası",
        capacity: "4-8 kişi"
      },
      {
        id: 4,
        name: "Villa Rüya-2",
        image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/ruya-2.jpg",
        price: 8000,
        location: "Kalkan - İslamlar",
        description: "4 yatak odası, her odada banyo, özel havuz, izole bahçe ve orman manzarası",
        capacity: "4-8 kişi"
      }
    ];

    let selectedVilla = villas[0];

    const WHATSAPP = "905339134700";

    function formatPrice(p) {
      return p + " ₺";
    }

    function openWA(villa) {
      const msg = `Merhaba, ${villa} için bilgi almak istiyorum.`;
      window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
    }

    function renderVillaList() {
      const list = document.getElementById("villaList");
      list.innerHTML = "";

      villas.forEach(v => {
        const card = document.createElement("button");

        card.className = `
          bg-white text-slate-900 rounded-[28px] overflow-hidden shadow-lg text-left
          transition hover:-translate-y-1
        `;

        card.onclick = () => {
          selectedVilla = v;
          render();
          document.getElementById("selectedSection").scrollIntoView({
            behavior: "smooth"
          });
        };

        card.innerHTML = `
          <img src="${v.image}" class="w-full h-56 object-cover" />
          <div class="p-5">
            <div class="flex justify-between">
              <div class="text-xl font-semibold">${v.name}</div>
              <div class="font-semibold">${formatPrice(v.price)}</div>
            </div>
            <div class="text-sm text-slate-500 mt-2">${v.location}</div>
            <div class="text-sm text-slate-600 mt-3">${v.description}</div>
            <div class="text-sm text-slate-500 mt-2">Kapasite: ${v.capacity}</div>
          </div>
        `;

        list.appendChild(card);
      });
    }

    function renderSelectedSection() {
      const section = document.getElementById("selectedSection");

      section.innerHTML = `
        <div class="bg-white text-slate-900 rounded-[32px] overflow-hidden shadow-xl mb-10">
          <img src="${selectedVilla.image}" class="w-full h-80 object-cover" />

          <div class="p-6">
            <div class="flex justify-between items-center">
              <div>
                <h2 class="text-3xl font-bold">${selectedVilla.name}</h2>
                <div class="text-slate-500 mt-2">${selectedVilla.location}</div>
              </div>
              <div class="text-xl font-semibold">${formatPrice(selectedVilla.price)} / gece</div>
            </div>

            <p class="mt-4 text-slate-700">${selectedVilla.description}</p>
            <div class="mt-2 text-slate-500">Kapasite: ${selectedVilla.capacity}</div>

            <button onclick="openWA('${selectedVilla.name}')"
              class="mt-6 bg-green-500 text-white px-6 py-3 rounded-xl hover:bg-green-600 transition">
              WhatsApp ile Sor
            </button>
          </div>
        </div>
      `;
    }

    function render() {
      renderVillaList();
      renderSelectedSection();
    }

    render();
  </script>

</body>
</html>
