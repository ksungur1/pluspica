<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlusPica</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

<h1 class="text-2xl font-bold mb-4">PlusPica</h1>

<div id="villaCard" class="mb-6"></div>
<div id="villaButtons" class="flex gap-3 mb-6"></div>
<div id="calendar" class="grid md:grid-cols-2 gap-4"></div>

<script>
const villas = [
  {
    id: 1,
    name: "Villa ruya-3",
    image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/Rüya-3.jpg",
    price: 9000,
    location: "Kalkan - Kördere",
    description: "4 yatak odası, her odada banyo, özel havuz ve deniz manzarası",
    capacity: "4-8 kişi"
  },
  {
    id: 2,
    name: "Villa ruya-4",
    image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/Rüya-4.jpg",
    price: 9000,
    location: "Kalkan - Kördere",
    description: "4 yatak odası, her odada banyo, özel havuz ve deniz manzarası",
    capacity: "4-8 kişi"
  },
  {
    id: 3,
    name: "Villa ruya-1",
    image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/Rüya-1.jpg",
    price: 8000,
    location: "Kalkan - İslamlar",
    description: "4 yatak odası, her odada banyo, özel havuz, izole bahçe ve orman manzarası",
    capacity: "4-8 kişi"
  },
  {
    id: 4,
    name: "Villa ruya-2",
    image: "https://raw.githubusercontent.com/ksungur1/pluspica/main/Rüya-2.jpg",
    price: 8000,
    location: "Kalkan - İslamlar",
    description: "4 yatak odası, her odada banyo, özel havuz, izole bahçe ve orman manzarası",
    capacity: "4-8 kişi"
  },
];

let selectedVilla = villas[0];

const WHATSAPP = "905339134700";

const availability = {
  "2026-04-13": { status: "dolu", price: 4500 },
  "2026-04-14": { status: "dolu", price: 4500 },
  "2026-04-15": { status: "dolu", price: 4500 },
};

const months = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const days = ["Pzt","Sal","Çar","Per","Cum","Cts","Paz"];

function formatPrice(p){return p+" ₺"}

function formatDateTR(d){
  const date=new Date(d);
  return date.getDate()+" "+months[date.getMonth()];
}

function openWA(villa,date){
  const msg=`Merhaba, ${villa} için ${formatDateTR(date)} tarihini sormak istiyorum. Müsait mi?`;
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`);
}

function buildMonth(year,month){
  const first=new Date(year,month,1);
  const last=new Date(year,month+1,0);
  const start=(first.getDay()+6)%7;
  const total=Math.ceil((start+last.getDate())/7)*7;

  let html=`<div class='bg-white p-4 rounded-2xl shadow-sm'>`;
  html+=`<h3 class='text-center font-semibold mb-3'>${months[month]} ${year}</h3>`;

  html+=`<div class='grid grid-cols-7 text-center text-sm text-gray-500 mb-2'>`;
  days.forEach(d=>html+=`<div>${d}</div>`);
  html+=`</div>`;

  html+=`<div class='grid grid-cols-7 gap-2'>`;

  for(let i=0;i<total;i++){
    const date=new Date(year,month,i-start+1);
    const iso=date.toISOString().split("T")[0];
    const item=availability[iso];

    const isCurrent=date.getMonth()===month;
    const status=item?.status||"musait";
    const price=item?.price||selectedVilla.price||5000;

    let style="bg-gray-100";
    if(isCurrent){
      style = status==="dolu" ? "bg-emerald-200" : "bg-blue-200";
    }

    const disabled=status==="dolu";

    html+=`<button onclick="${!disabled ? `openWA('${selectedVilla.name}','${iso}')` : ""}"
      class="p-2 rounded-lg text-xs ${style} ${disabled?"opacity-50":"hover:scale-105"}">
      <div class='font-bold'>${date.getDate()}</div>
      <div>${formatPrice(price)}</div>
    </button>`;
  }

  html+=`</div></div>`;
  return html;
}

function render(){
  const card=document.getElementById("villaCard");
  card.innerHTML=`
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <img src="${selectedVilla.image}" class="w-full h-64 object-cover" />
      <div class="p-4">
        <div class="text-xl font-bold">${selectedVilla.name}</div>
        <div class="text-gray-500">${selectedVilla.location||""}</div>
        <div class="text-sm text-gray-600 mt-1">${selectedVilla.description||""}</div>
        <div class="text-sm text-gray-500 mt-1">Kapasite: ${selectedVilla.capacity||""}</div>
        <div class="mt-2 font-semibold">${formatPrice(selectedVilla.price||5000)} / gece</div>
      </div>
    </div>
  `;

  const vb=document.getElementById("villaButtons");
  vb.innerHTML="";

  villas.forEach(v=>{
    const btn=document.createElement("button");
    btn.innerText=v.name;
    btn.className=`px-4 py-2 rounded-lg border ${selectedVilla.id===v.id?"bg-black text-white":"bg-white"}`;
    btn.onclick=()=>{selectedVilla=v;render()};
    vb.appendChild(btn);
  });

  const cal=document.getElementById("calendar");
  cal.innerHTML = buildMonth(2026,3)+buildMonth(2026,4);
}

render();
</script>

</body>
</html>
