<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PlusPica Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body class="bg-[#1e3470] text-white font-sans">

<div class="max-w-3xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6">Rezervasyon Oluştur</h1>

  <div class="bg-white text-slate-900 rounded-xl p-6 space-y-4">

    <select id="villaSelect" class="w-full p-3 border rounded-lg"></select>

    <input id="name" placeholder="Ad Soyad" class="w-full p-3 border rounded-lg"/>
    <input id="phone" placeholder="Telefon" class="w-full p-3 border rounded-lg"/>

    <div class="grid grid-cols-2 gap-4">
      <input type="date" id="startDate" class="p-3 border rounded-lg"/>
      <input type="date" id="endDate" class="p-3 border rounded-lg"/>
    </div>

    <textarea id="note" placeholder="Not" class="w-full p-3 border rounded-lg min-h-[100px]"></textarea>

    <div class="bg-slate-100 p-4 rounded-lg">
      <div>Gece: <b id="nights">0</b></div>
      <div>Toplam: <b id="total">0 ₺</b></div>
    </div>

    <button onclick="createPDF()" class="w-full bg-green-500 text-white p-3 rounded-lg">
      PDF İndir
    </button>

  </div>
</div>

<!-- PDF TEMPLATE -->
<div id="pdfTemplate" style="position:absolute; left:-9999px; width:900px; background:#fff; padding:40px;">

  <div style="border:1px solid #ddd; border-radius:20px; overflow:hidden;">

    <div style="background:#1e3470; padding:20px; display:flex; justify-content:space-between; align-items:center;">
      <img src="logo.png" style="height:60px;" />
      <div style="color:white; text-align:right;">
        <div style="font-size:14px;">Oluşturma Tarihi</div>
        <div id="pdfCreatedAt" style="font-size:16px;"></div>
      </div>
    </div>

    <div style="padding:30px; font-family: Arial;">

      <h2 style="font-size:28px; margin-bottom:20px;">Rezervasyon Formu</h2>

      <div style="margin-bottom:20px;">
        <b>Villa:</b> <span id="pdfVilla"></span>
      </div>

      <div style="display:flex; gap:20px; margin-bottom:20px;">
        <div style="flex:1;">
          <div>Ad Soyad</div>
          <b id="pdfName"></b>
        </div>
        <div style="flex:1;">
          <div>Telefon</div>
          <b id="pdfPhone"></b>
        </div>
      </div>

      <div style="display:flex; gap:20px; margin-bottom:20px;">
        <div style="flex:1;">
          <div>Giriş</div>
          <b id="pdfStart"></b>
        </div>
        <div style="flex:1;">
          <div>Çıkış</div>
          <b id="pdfEnd"></b>
        </div>
      </div>

      <div style="display:flex; gap:20px; margin-bottom:20px;">
        <div style="flex:1;">
          <div>Gece</div>
          <b id="pdfNights"></b>
        </div>
        <div style="flex:1;">
          <div>Gecelik Ortalama</div>
          <b id="pdfAvg"></b>
        </div>
      </div>

      <div style="background:#e6f7ec; padding:15px; border-radius:10px; margin-bottom:20px;">
        <div>Toplam Tutar</div>
        <h2 id="pdfTotal"></h2>
      </div>

      <div>
        <div>Not</div>
        <div id="pdfNote"></div>
      </div>

    </div>

  </div>

</div>

<script>

let villas = [];

function parseISO(iso){
  const [y,m,d]=iso.split("-").map(Number);
  return new Date(y,m-1,d);
}

function formatDateTR(iso){
  const d = parseISO(iso);
  const aylar = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  return `${d.getDate()} ${aylar[d.getMonth()]} ${d.getFullYear()}`;
}

function getNightPrice(villa, month){
  return Number(villa.monthlyPrices[String(month)] || 0);
}

function calc(){
  const villa = villas[document.getElementById("villaSelect").value];
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  if(!villa || !start || !end) return;

  let total = 0;
  let nights = 0;

  let current = parseISO(start);
  const endDate = parseISO(end);

  while(current < endDate){
    total += getNightPrice(villa, current.getMonth()+1);
    current.setDate(current.getDate()+1);
    nights++;
  }

  document.getElementById("nights").innerText = nights;
  document.getElementById("total").innerText = total.toLocaleString("tr-TR") + " ₺";

  return {total, nights};
}

async function load(){
  const res = await fetch("./villas.json");
  villas = await res.json();

  const select = document.getElementById("villaSelect");

  villas.forEach((v,i)=>{
    const opt = document.createElement("option");
    opt.value=i;
    opt.innerText=v.name;
    select.appendChild(opt);
  });
}

async function createPDF(){

  const { jsPDF } = window.jspdf;

  const villa = villas[document.getElementById("villaSelect").value];
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;
  const note = document.getElementById("note").value;

  const result = calc();

  document.getElementById("pdfCreatedAt").innerText = new Date().toLocaleString("tr-TR");
  document.getElementById("pdfVilla").innerText = villa.name;
  document.getElementById("pdfName").innerText = name;
  document.getElementById("pdfPhone").innerText = phone;
  document.getElementById("pdfStart").innerText = formatDateTR(start);
  document.getElementById("pdfEnd").innerText = formatDateTR(end);
  document.getElementById("pdfNights").innerText = result.nights;
  document.getElementById("pdfAvg").innerText = Math.round(result.total/result.nights) + " ₺";
  document.getElementById("pdfTotal").innerText = result.total.toLocaleString("tr-TR") + " ₺";
  document.getElementById("pdfNote").innerText = note || "-";

  const canvas = await html2canvas(document.getElementById("pdfTemplate"), {scale:2});
  const imgData = canvas.toDataURL("image/png");

  const pdf = new jsPDF("p","mm","a4");
  pdf.addImage(imgData,"PNG",0,0,210,297);

  pdf.save("rezervasyon.pdf");
}

load();

</script>

</body>
</html>
